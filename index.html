<script>
  (function () {
    var items = document.querySelectorAll('.projects-list__item');
    var gif = document.querySelector('.projects-preview__gif');
    var gifWrapper = document.querySelector('.projects-preview__gif-wrapper');
    var description = document.querySelector('.projects-preview__description');
    var loaded = {};

    function activate(item) {
      items.forEach(function (el) {
        el.classList.remove('is-active');
        el.setAttribute('aria-pressed', 'false');
      });
      item.classList.add('is-active');
      item.setAttribute('aria-pressed', 'true');

      var src    = item.dataset.gif;
      var github = item.dataset.github;
      var live   = item.dataset.live;
      var label  = item.dataset.label;
      var desc   = item.dataset.description;

      gif.classList.remove('is-loaded');
      gif.src = src;
      gif.alt = label + ' preview';
      gif.onload = function () { gif.classList.add('is-loaded'); };
      gifWrapper.classList.add('has-content');
      description.textContent = desc || '';
    }

    items.forEach(function (item) {
      item.addEventListener('mouseenter', function () {
        activate(item);
      });
      item.addEventListener('click', function () {
        activate(item);
      });
      item.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); activate(item); }
      });
    });

    if (items.length > 0) {
      window.addEventListener('load', function () { activate(items[0]); });
    }
  })();
</script>
